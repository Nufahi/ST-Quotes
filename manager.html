<div id="stq-modal" class="stq-modal stq-hidden">
    <div class="stq-backdrop"></div>
    <div class="stq-panel">
        <div class="stq-header">
            <button id="stq-back" class="stq-icon-btn stq-hidden" title="Back">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="stq-header-titles">
                <div id="stq-title" class="stq-header-title">Quotes</div>
                <div id="stq-crumb" class="stq-header-crumb"></div>
            </div>
            <button class="stq-icon-btn" data-stq-close title="Close">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div id="stq-tools" class="stq-tools stq-hidden">
            <div class="stq-search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input id="stq-search" class="text_pole" type="text" placeholder="Search quotes & notes...">
            </div>
        </div>

        <div id="stq-body" class="stq-body"></div>
    </div>
</div>
